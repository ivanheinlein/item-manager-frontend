name: Run BDD Tests

on:
  pull_request:
    branches:
      - '*'

jobs:
  bdd-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Start dev server
        run: |
          npm run serve &
          npx wait-on http://localhost:8080
        env:
          CI: true

      - name: Run BDD tests
        run: npm run test:bdt
